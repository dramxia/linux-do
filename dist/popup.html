<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }
    .header h1 { font-size: 14px; font-weight: 600; color: #fff; }
    .header .icon { font-size: 20px; }
    .info {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 14px;
      line-height: 1.6;
    }
    .info .title { color: #e0e0e0; font-weight: 500; }
    .btn-group { display: flex; flex-direction: column; gap: 8px; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 12px; border: 1px solid #444; border-radius: 8px;
      background: #16213e; color: #e0e0e0; font-size: 13px; cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: #1a3a5c; border-color: #555; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn svg { flex-shrink: 0; }
    .btn.primary { background: #0f3460; border-color: #1a5276; }
    .btn.primary:hover { background: #1a5276; }
    .section-title {
      margin: 14px 0 8px;
      font-size: 12px;
      color: #8fb3ff;
      font-weight: 600;
    }
    .setting-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      border: 1px solid #333;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
    }
    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 12px;
      color: #cfcfcf;
      line-height: 1.4;
    }
    .setting-item input { accent-color: #1a5276; }
    .hint {
      font-size: 11px; color: #777; text-align: center; margin-top: 12px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="icon">📋</span>
    <h1>Linux.do 工具箱</h1>
  </div>

  <div class="info" id="info">正在检测页面...</div>

  <div class="btn-group">
    <button class="btn primary" id="copyTopic">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
      复制当前已加载楼层
    </button>
    <button class="btn primary" id="downloadTopic">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      下载当前已加载楼层 (.md)
    </button>
  </div>

  <div class="section-title">功能开关</div>
  <div class="setting-list">
    <label class="setting-item">
      <span>显示楼层复制 / 下载按钮</span>
      <input id="enablePostActions" type="checkbox">
    </label>
    <label class="setting-item">
      <span>启用选中文本 Base64 解码</span>
      <input id="enableBase64Decode" type="checkbox">
    </label>
    <label class="setting-item">
      <span>导出时保留来源元信息</span>
      <input id="includeMetadata" type="checkbox">
    </label>
    <label class="setting-item">
      <span>替换 upload:// 图片链接</span>
      <input id="replaceUploadUrls" type="checkbox">
    </label>
  </div>

  <div class="hint">💡 整帖导出范围为页面当前已加载楼层</div>
  <script src="popup.js"></script>
</body>
</html>
