<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Blockquote fixture</title>
  </head>
  <body>
    <p>Before the quote.</p>
    <aside class="quote" data-username="alice">
      <div class="title">Quote</div>
      <blockquote>
        <p>This is a quoted paragraph from <strong>alice</strong>.</p>
        <p>Second paragraph of the quote.</p>
      </blockquote>
    </aside>
    <p>After the quote.</p>
  </body>
</html>
